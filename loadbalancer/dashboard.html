<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPOC — Load Balancer Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    max-width: 640px;
    width: 100%;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #f8fafc;
  }
  .strategy-label {
    font-size: 1.1rem;
    margin-bottom: 24px;
    color: #94a3b8;
  }
  .strategy-label span {
    color: #38bdf8;
    font-weight: 600;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 28px;
    background: #1e293b;
    border-radius: 8px;
    overflow: hidden;
  }
  th {
    text-align: left;
    padding: 12px 16px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #64748b;
    border-bottom: 1px solid #334155;
  }
  td {
    padding: 12px 16px;
    font-size: 0.9rem;
    border-bottom: 1px solid #1e293b;
  }
  tr:last-child td { border-bottom: none; }
  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }
  .dot.alive { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .dot.dead  { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .status-text { vertical-align: middle; }
  .conns {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: #f8fafc;
  }
  .buttons {
    display: flex;
    gap: 12px;
  }
  button {
    flex: 1;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 500;
    border: 1px solid #334155;
    border-radius: 6px;
    background: #1e293b;
    color: #cbd5e1;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button:hover {
    background: #334155;
    color: #f8fafc;
  }
  button.active {
    background: #0ea5e9;
    border-color: #0ea5e9;
    color: #fff;
  }
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    background: #7f1d1d;
    border-radius: 6px;
    font-size: 0.85rem;
    color: #fca5a5;
    display: none;
  }
  .updated {
    margin-top: 12px;
    font-size: 0.75rem;
    color: #475569;
    text-align: right;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Load Balancer Dashboard</h1>
  <div class="strategy-label">Strategy: <span id="strategyName">—</span></div>

  <table>
    <thead>
      <tr><th>Backend</th><th>Status</th><th>Active Conns</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="buttons">
    <button id="btnRR" onclick="setStrategy('round-robin')">Round Robin</button>
    <button id="btnLC" onclick="setStrategy('least-connections')">Least Connections</button>
  </div>

  <div class="error" id="error"></div>
  <div class="updated" id="updated"></div>
</div>

<script>
  const tbody = document.getElementById('tbody');
  const strategyEl = document.getElementById('strategyName');
  const btnRR = document.getElementById('btnRR');
  const btnLC = document.getElementById('btnLC');
  const errorEl = document.getElementById('error');
  const updatedEl = document.getElementById('updated');

  function refresh() {
    fetch('/stats')
      .then(r => r.json())
      .then(data => {
        errorEl.style.display = 'none';
        strategyEl.textContent = data.strategy;
        btnRR.classList.toggle('active', data.strategy === 'round-robin');
        btnLC.classList.toggle('active', data.strategy === 'least-connections');

        let html = '';
        for (const b of data.backends) {
          const dotClass = b.alive ? 'alive' : 'dead';
          const label = b.alive ? 'Alive' : 'Down';
          html += '<tr>'
            + '<td>' + b.addr + '</td>'
            + '<td><span class="dot ' + dotClass + '"></span><span class="status-text">' + label + '</span></td>'
            + '<td class="conns">' + b.activeConns + '</td>'
            + '</tr>';
        }
        tbody.innerHTML = html;
        updatedEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
      })
      .catch(err => {
        errorEl.textContent = 'Failed to fetch stats: ' + err.message;
        errorEl.style.display = 'block';
      });
  }

  function setStrategy(name) {
    fetch('/strategy?name=' + name, { method: 'POST' })
      .then(() => refresh())
      .catch(err => {
        errorEl.textContent = 'Failed to set strategy: ' + err.message;
        errorEl.style.display = 'block';
      });
  }

  refresh();
  setInterval(refresh, 1500);
</script>
</body>
</html>
